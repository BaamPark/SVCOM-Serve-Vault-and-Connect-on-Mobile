<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vault Browser</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div id="app" class="app-shell">
      <section id="login-screen" class="login-screen">
        <form id="login-form" class="card login-card">
          <h1>Vault Browser</h1>
          <p>Enter the server password to access your vault.</p>
          <label class="stack" for="password-input">
            <span>Password</span>
            <input id="password-input" type="password" autocomplete="current-password" required>
          </label>
          <button type="submit">Unlock Vault</button>
          <p id="login-error" class="error-text" hidden></p>
        </form>
      </section>

      <section id="main-screen" class="main-screen" hidden>
        <header class="topbar">
          <div>
            <h1 id="vault-name">Vault Browser</h1>
            <p id="status-text">Connecting...</p>
          </div>
          <div class="topbar-actions">
            <button id="new-note-button" type="button">New Note</button>
            <button id="logout-button" type="button" class="secondary">Lock</button>
          </div>
        </header>

        <section class="sidebar card">
          <label class="stack" for="search-input">
            <span>Search</span>
            <input id="search-input" type="search" placeholder="Search notes">
          </label>
          <div id="search-results" class="search-results" hidden></div>
          <div id="notes-tree" class="notes-tree"></div>
        </section>

        <section class="workspace">
          <article class="editor card">
            <div class="editor-toolbar">
              <div>
                <h2 id="note-title">Select a note</h2>
                <p id="note-path" class="muted">No note selected</p>
              </div>
              <div class="editor-actions">
                <button id="rename-note-button" type="button" class="secondary">Rename</button>
                <button id="delete-note-button" type="button" class="danger">Delete</button>
              </div>
            </div>
            <textarea id="editor-input" placeholder="Choose a note to start editing"></textarea>
          </article>

          <article class="preview card">
            <div class="preview-header">
              <h2>Preview</h2>
            </div>
            <div id="preview-output" class="preview-output"></div>
          </article>
        </section>
      </section>
    </div>

    <script src="/app.js"></script>
  </body>
  </html>
